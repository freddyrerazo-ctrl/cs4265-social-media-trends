hdfs:
  host: "localhost"
  port: 9000
  raw_data_path: "/data/social/raw"
  processed_path: "/data/social/processed"
  block_size: "128MB"
  replication_factor: 3

hbase:
  table_name: "social_media_trends"
  column_families:
    - "metrics" 
    - "meta"

spark:
  app_name: "SocialMediaTrendAnalytics"
  log_level: "INFO"